name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# 把权限放在顶层，确保 Pages/部署 action 有写权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 如果你有构建步骤（如 npm run build），可以在这里加入。若无（本仓库是静态文件），直接上传根目录即可。
      # - name: Build
      #   run: |
      #     npm ci
      #     npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # 要部署的目录（项目根）。如有 build 输出目录请改为 'build' 或相对路径。

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
